<button
    class="btn btn-sm btn-outline-primary"
    hx-post="{% url 'clock_control' clock.id %}"
    hx-vals='{"toggle_tick":"button"}'
    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
    hx-target="#clock-{{ clock.id }}"
    hx-swap="innerHTML"
    title="{% if clock.tick_enabled %}Поставити на паузу{% else %}Запустити годинник{% endif %}">
  {% if clock.tick_enabled %}⏸{% else %}▶{% endif %}
</button>
