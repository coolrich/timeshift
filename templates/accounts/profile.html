{% extends "base.html" %}

{% block title %}Профіль – {{ ENV_SITE_NAME }}{% endblock %}

{% block content %}
<div class="container py-4">
    <h1 class="mb-4">Мій профіль</h1>
    
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">API Токен</h5>
            {% if user.virtual_clock %}
                <p class="card-text">
                    <code>{{ user.virtual_clock.api_token }}</code>
                </p>
            {% else %}
                <p class="text-muted">Токен ще не згенеровано.</p>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
