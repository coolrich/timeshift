{% extends "accounts/profile_base.html" %}
{% block title %}{{ clock.name }} – {{ ENV_SITE_NAME }}{% endblock %}

{% block profile_content %}
<h2>{{ clock.name }}</h2>
<p><strong>API токен:</strong> <code>{{ clock.api_token }}</code></p>
<p><strong>Активність:</strong> {{ clock.tick_enabled|yesno:"увімкнений,вимкнений" }}</p>

<hr>
<a href="{% url 'profile_clocks' %}" class="btn btn-secondary mt-3">← Назад</a>
{% endblock %}
